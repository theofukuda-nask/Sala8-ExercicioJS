<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

    <title>Document</title>
</head>

<body>
    <h1>Bootstrap 5 Componentes</h1>
    <br>
    <hr>
    <br>

    <div class="central">
        <div class="spinner-border text-info" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <br>
    <hr>
    <br>

    <div class="central">
        <div class="alert alert-danger" role="alert">
            CUIDADO GAYS NA ÁREA
        </div>
    </div>

    <br>
    <hr>
    <br>

    <div class="central">
        <button type="button" class="btn-close" aria-label="Close"></button>
    </div>

    <br>
    <hr>
    <br>

    <div class="central">
        <ul class="list-group">
            <li class="list-group-item">1 + 1 = 2</li>
            <li class="list-group-item">1 * 1 = 1</li>
            <li class="list-group-item">1 / 1 = 1</li>
            <li class="list-group-item">1 - 1 = 0</li>
            <li class="list-group-item">1 + 1 - 1 / 1 * 1 = 1</li>
        </ul>
    </div>

    <br>
    <hr>
    <br>

    <div class="central">
        <nav aria-label="Page navigation example">
            <ul class="pagination">
                <li class="page-item"><a class="page-link" href="#">Antes</a></li>
                <li class="page-item"><a class="page-link" href="#">1</a></li>
                <li class="page-item"><a class="page-link" href="#">2</a></li>
                <li class="page-item"><a class="page-link" href="#">3</a></li>
                <li class="page-item"><a class="page-link" href="#">Depois do antes</a></li>
            </ul>
        </nav>
    </div>

    <br>
    <hr>
    <br>

    <div class="central">
        <div class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header">
                <img src="..." class="rounded me-2" alt="...">
                <strong class="me-auto">CarlinhosSplash</strong>
                <small>11 horas atrás</small>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body">
                Olá
            </div>
        </div>
    </div>

    <br>
    <hr>
    <br>

    <div class="central">
        <button type="button" class="btn btn-outline-dark">Modo Preto</button>
    </div>

    <br>
    <hr>
    <br>

    <div class="central">
        <button type="button" class="btn btn-secondary" data-bs-toggle="tooltip" data-bs-placement="top" title="Tooltip on top">
            Tooltip on top
        </button>
        <button type="button" class="btn btn-secondary" data-bs-toggle="tooltip" data-bs-placement="right" title="Tooltip on right">
            Tooltip on right
        </button>
        <button type="button" class="btn btn-secondary" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Tooltip on bottom">
            Tooltip on bottom
        </button>
        <button type="button" class="btn btn-secondary" data-bs-toggle="tooltip" data-bs-placement="left" title="Tooltip on left">
            Tooltip on left
        </button>
    </div>

    <br>
    <hr>
    <br>

    <div class="central">
        <div class="btn-group" role="group" aria-label="Basic mixed styles example">
            <button type="button" class="btn btn-danger">Left</button>
            <button type="button" class="btn btn-warning">Middle</button>
            <button type="button" class="btn btn-success">Right</button>
        </div>
    </div>

    <br>
    <hr>
    <br>

    <div class="central">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item active" aria-current="page">Home</li>
            </ol>
        </nav>

        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="#"></a></li>
                <li class="breadcrumb-item active" aria-current="page">Library</li>
            </ol>
        </nav>

        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="#"></a></li> 
                <li class="breadcrumb-item active" aria-current="page">Data</li>
            </ol>
        </nav>
    </div>
</body>

</html>
